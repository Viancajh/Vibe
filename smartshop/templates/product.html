{% extends "base.html" %}
{% block title %}Producto — Vibe{% endblock %}
{% block content %}

<div class="live-stats-banner" id="liveStatsBanner" style="display:none">
    <div class="lsb-stat">
        <span class="lsb-icon">📦</span>
        <span class="lsb-num" id="bannerStock">—</span>
        <span class="lsb-label">en stock</span>
    </div>
    <div class="lsb-stat">
        <span class="lsb-icon">👁️</span>
        <span class="lsb-num" id="bannerViews">—</span>
        <span class="lsb-label">vistas</span>
    </div>
    <div class="lsb-stat">
        <span class="lsb-icon">🛒</span>
        <span class="lsb-num" id="bannerSold">—</span>
        <span class="lsb-label">vendidos</span>
    </div>
    <div class="lsb-live"><span class="live-dot"></span> En vivo</div>
</div>

<div class="product-detail-wrap" id="productDetail">
    <div class="loading-spinner">Cargando producto…</div>
</div>

<section class="section" id="relatedSection" style="display:none">
    <div class="section-header">
        <h2>🔗 También te puede interesar</h2>
    </div>
    <div class="products-grid" id="relatedGrid"></div>
</section>

{% endblock %}
{% block scripts %}
<script>
// Servido por Flask -> {{ product_id }} viene relleno.
// Servido estático en Netlify -> queda vacío y lo leemos de la URL (/product/<id>).
const PRODUCT_ID  = "{{ product_id }}" || decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
let viewStartTime = Date.now();
let product       = null;

document.addEventListener('DOMContentLoaded', async () => {
    await loadProduct();
    loadRelated();
    connectRealtime();
});

// ── Tiempo real (SSE) ─────────────────────────────────────────
let evtSource = null;

function connectRealtime() {
    if (evtSource) evtSource.close();
    evtSource = new EventSource(`${window.BACKEND_URL||''}/api/stream/product/${PRODUCT_ID}`);
    evtSource.addEventListener('update', (e) => {
        try { applyRealtime(JSON.parse(e.data)); } catch (_) {}
    });
    // Si se cae la conexión, EventSource reintenta solo automáticamente.
}

// Actualiza un número del banner y le da un "pulso" si cambió de valor.
function setBannerStat(id, value) {
    const el = document.getElementById(id);
    if (!el || value === undefined) return;
    const next = String(value);
    if (el.textContent !== next) {
        el.textContent = next;
        el.classList.remove('lsb-bump');
        void el.offsetWidth;            // reinicia la animación
        el.classList.add('lsb-bump');
    }
}

// Refresca el banner superior con los 3 datos en vivo.
function updateBanner(s) {
    const banner = document.getElementById('liveStatsBanner');
    if (banner) banner.style.display = 'flex';
    if (s.stock !== undefined)     setBannerStat('bannerStock', s.stock);
    if (s.views !== undefined)     setBannerStat('bannerViews', s.views);
    if (s.purchases !== undefined) setBannerStat('bannerSold',  s.purchases);
}

function applyRealtime(s) {
    if (s.product_id && s.product_id !== PRODUCT_ID) return;
    updateBanner(s);
    const stockEl = document.getElementById('metaStock');
    const viewsEl = document.getElementById('metaViews');
    const purchEl = document.getElementById('metaPurchases');
    if (stockEl && s.stock !== undefined) {
        stockEl.textContent = s.stock > 0 ? `📦 ${s.stock} en stock` : '⛔ Agotado';
    }
    if (viewsEl && s.views !== undefined)     viewsEl.textContent = `👁️ ${s.views} vistas`;
    if (purchEl && s.purchases !== undefined) purchEl.textContent = `🛒 ${s.purchases} vendidos`;

    const box  = document.getElementById('liveViewers');
    const text = document.getElementById('liveViewersText');
    if (box && text && s.viewers !== undefined) {
        if (s.viewers > 1) {
            text.textContent = `${s.viewers} personas viendo esto ahora`;
            box.style.display = 'flex';
        } else if (s.viewers === 1) {
            text.textContent = 'Tú estás viendo esto ahora';
            box.style.display = 'flex';
        } else {
            box.style.display = 'none';
        }
    }
    if (product && s.stock !== undefined) product.stock = s.stock;
}

window.addEventListener('beforeunload', () => { if (evtSource) evtSource.close(); });

async function loadProduct() {
    const wrap = document.getElementById('productDetail');
    try {
        const res = await fetch(`/api/products/${PRODUCT_ID}`);
        product   = await res.json();
        if (!res.ok) { wrap.innerHTML='<p class="empty-msg">Producto no encontrado.</p>'; return; }

        const stars = '★'.repeat(Math.round(product.rating||3)) + '☆'.repeat(5-Math.round(product.rating||3));
        wrap.innerHTML = `
            <div class="product-detail">
                <div class="detail-img-wrap">
                    <img src="${product.image}" data-local="${product.image_local || ''}" alt="${product.name}" onerror="imgFallback(this)">
                    <span class="product-cat-badge big">${product.category}</span>
                </div>
                <div class="detail-info">
                    <h1>${product.name}</h1>
                    <div class="detail-rating">${stars} <span style="color:var(--gray);font-size:.9rem">${product.rating} / 5 estrellas</span></div>
                    <p class="detail-desc">${product.description}</p>
                    <div class="detail-meta">
                        <span id="metaStock">📦 ${product.stock} en stock</span>
                        <span id="metaViews">👁️ ${product.views} vistas</span>
                        <span id="metaPurchases">🛒 ${product.purchases} vendidos</span>
                    </div>
                    <div id="liveViewers" class="live-viewers" style="display:none">
                        <span class="live-dot"></span> <span id="liveViewersText"></span>
                    </div>
                    <div class="detail-price">$${product.price.toFixed(2)}</div>
                    <div id="popularityBar" class="ml-prediction" style="display:none">
                        <span class="ml-label">Popularidad del producto</span>
                        <span id="predText"></span>
                        <div class="prob-bar"><div class="prob-fill" id="probFill"></div></div>
                    </div>
                    <div class="detail-actions">
                        <button class="btn btn-primary btn-lg" onclick="addToCartDetail()">🛒 Agregar al carrito</button>
                        <button class="btn btn-outline-dark btn-lg" onclick="location.href='/'">← Volver</button>
                    </div>
                </div>
            </div>`;

        document.title = `${product.name} — Vibe`;
        updateBanner(product);   // valores iniciales del banner superior
        if (getToken()) {
            document.getElementById('popularityBar').style.display = 'flex';
            loadPopularity();
            trackInteraction('click', product.category);
        }
    } catch(e) { wrap.innerHTML='<p class="empty-msg">Error al cargar el producto.</p>'; }
}

async function loadPopularity() {
    try {
        const res  = await apiFetch(`/api/recommendations/purchase-probability/${PRODUCT_ID}`);
        const data = await res.json();
        const pct  = Math.round(data.probability * 100);
        document.getElementById('predText').textContent = pct > 70 ? `Muy popular entre clientes como tú (${pct}%)` : pct > 40 ? `Producto de interés moderado (${pct}%)` : `Producto de nicho (${pct}%)`;
        const fill = document.getElementById('probFill');
        fill.style.width      = `${pct}%`;
        fill.style.background = pct > 70 ? '#10b981' : pct > 40 ? '#f59e0b' : '#3b82f6';
    } catch(e) {}
}

async function loadRelated() {
    const section = document.getElementById('relatedSection');
    const grid    = document.getElementById('relatedGrid');
    try {
        const url = getToken() ? '/api/recommendations/for-you' : '/api/products/popular';
        const res = getToken() ? await apiFetch(url) : await fetch(url);
        const data = await res.json();
        const filtered = data.filter(p => p._id !== PRODUCT_ID).slice(0, 4);
        if (!filtered.length) return;
        section.style.display = 'block';
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="location.href='/product/${p._id}'">
                <div class="product-img-wrap">
                    <img src="${p.image}" data-local="${p.image_local || ''}" alt="${p.name}" loading="lazy" onerror="imgFallback(this)">
                    <span class="product-cat-badge">${p.category}</span>
                </div>
                <div class="product-info">
                    <h3 class="product-name">${p.name}</h3>
                    <div class="product-footer">
                        <span class="product-price">$${p.price.toFixed(2)}</span>
                        <button class="btn-cart-small" data-id="${p._id}" data-name="${escapeHtml(p.name)}"
                            onclick="event.stopPropagation();addToCartFromBtn(this)">+ Carrito</button>
                    </div>
                </div>
            </div>`).join('');
    } catch(e) {}
}

function addToCartDetail() { if (product) addToCart(PRODUCT_ID, product.name); }

window.addEventListener('beforeunload', () => {
    if (getToken() && product) {
        const duration = Math.round((Date.now() - viewStartTime) / 1000);
        navigator.sendBeacon('/api/interactions/track', JSON.stringify({product_id:PRODUCT_ID, action:'view', category:product.category, duration}));
    }
});
</script>
{% endblock %}
