{% extends "base.html" %}
{% block title %}Iniciar sesión — Vibe{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">V</div>
            Vibe
        </div>
        <h2>Bienvenido de nuevo</h2>
        <p class="auth-sub">Inicia sesión para continuar comprando</p>

        <div id="authError" class="auth-error" style="display:none"></div>

        <div class="auth-form">
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primary btn-full" onclick="doLogin()">Iniciar sesión</button>
        </div>

        <p class="auth-switch">¿No tienes cuenta? <a href="/register">Regístrate gratis</a></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(location.search);
    if (params.get('msg') === 'session') {
        const errBox = document.getElementById('authError');
        errBox.textContent = 'Tu sesión expiró. Inicia sesión de nuevo.';
        errBox.style.display = 'block';
    }
});
async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errBox   = document.getElementById('authError');
    errBox.style.display = 'none';
    if (!email || !password) { errBox.textContent='Completa todos los campos.'; errBox.style.display='block'; return; }
    try {
        const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password,guest_id:getGuestId()}) });
        const data = await res.json();
        if (!res.ok) { errBox.textContent=data.error||'Error al iniciar sesión'; errBox.style.display='block'; return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        showToast('¡Bienvenido, ' + data.user.name + '!');
        setTimeout(() => location.href = '/', 800);
    } catch(e) { errBox.textContent='Error de conexión.'; errBox.style.display='block'; }
}
document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
</script>
{% endblock %}
